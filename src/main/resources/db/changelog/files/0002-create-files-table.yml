databaseChangeLog:
  - changeSet:
      id: 0002-1
      author: AVSmirnov
      changes:
        - createTable:
            schemaName: files
            tableName: file_metadata
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: "Идентификатор записи"
              - column:
                  name: owner_id
                  type: uuid
                  constraints:
                    nullable: false
                  remarks: "Id пользователя, сохраняющего файл"
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                  remarks: "Название файла"
              - column:
                  name: bucket_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                  remarks: "Название бакета"
              - column:
                  name: s3_key
                  type: VARCHAR(1024)
                  constraints:
                    nullable: false
                  remarks: "Ключ в S3"
              - column:
                  name: size_bytes
                  type: BIGINT
                  constraints:
                    nullable: false
                  remarks: "Размер загружаемого файла"
              - column:
                  name: content_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                  remarks: "Тип файла"
              - column:
                  name: status
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Статус файла"
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  remarks: "Дата создания записи"
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  remarks: "Дата обновления записи"
        - addUniqueConstraint:
            schemaName: files
            tableName: file_metadata
            columnNames: s3_key
            constraintName: uk_file_metadata_s3_key
        - createIndex:
            schemaName: files
            tableName: file_metadata
            indexName: idx_file_metadata_owner_id
            columns:
              - column:
                  name: owner_id
        - createIndex:
            schemaName: files
            tableName: file_metadata
            indexName: idx_file_metadata_status_created_at
            columns:
              - column:
                  name: status
              - column:
                  name: created_at
