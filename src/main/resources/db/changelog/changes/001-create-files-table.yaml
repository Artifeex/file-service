databaseChangeLog:
  - changeSet:
      id: 001-create-file-status-enum
      author: codex
      changes:
        - sql:
            splitStatements: false
            sql: |
              DO $$
              BEGIN
                IF NOT EXISTS (SELECT 1 FROM pg_type WHERE typname = 'file_status') THEN
                  CREATE TYPE file_status AS ENUM ('PENDING', 'ACTIVE');
                END IF;
              END;
              $$;

  - changeSet:
      id: 002-create-files-table
      author: codex
      changes:
        - createTable:
            tableName: files
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: owner_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: original_filename
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: bucket_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: s3_key
                  type: VARCHAR(1024)
                  constraints:
                    nullable: false
              - column:
                  name: size_bytes
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: file_status
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: files
            columnNames: s3_key
            constraintName: uk_files_s3_key

        - createIndex:
            tableName: files
            indexName: idx_files_owner_id
            columns:
              - column:
                  name: owner_id

        - createIndex:
            tableName: files
            indexName: idx_files_status_created_at
            columns:
              - column:
                  name: status
              - column:
                  name: created_at
