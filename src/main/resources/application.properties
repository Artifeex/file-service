spring.application.name=file-service

server.port=${SERVER_PORT:8083}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/file_service}
spring.datasource.username=${DB_USERNAME:file_service}
spring.datasource.password=${DB_PASSWORD:file_service}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

spring.security.oauth2.resourceserver.jwt.public-key-location=${JWT_PUBLIC_KEY_LOCATION:classpath:keys/public.pem}

app.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
app.s3.region=${S3_REGION:us-east-1}
app.s3.access-key=${S3_ACCESS_KEY:minioadmin}
app.s3.secret-key=${S3_SECRET_KEY:minioadmin}
app.s3.public-bucket=${S3_PUBLIC_BUCKET:public-content}
app.s3.private-bucket=${S3_PRIVATE_BUCKET:private-content}
